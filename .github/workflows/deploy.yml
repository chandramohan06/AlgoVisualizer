name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  validate:
    name: Build & Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Typecheck — Client
        run: npx tsc --noEmit
        working-directory: client

      - name: Typecheck — Server
        run: npx tsc --noEmit
        working-directory: server

      - name: Linter Verification
        run: npm run lint

      - name: Compile and Build All Modules
        run: npm run build
